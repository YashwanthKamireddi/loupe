name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: loupe-py · ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: packages/loupe-py

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui,langgraph]'

      - name: lint
        run: python -m ruff check src/ tests/

      - name: type-check
        run: python -m mypy --ignore-missing-imports src/loupe/trace.py src/loupe/store.py src/loupe/annotation.py src/loupe/bench.py
        continue-on-error: true  # advisory until we tighten types

      - name: test
        run: python -m pytest -q
