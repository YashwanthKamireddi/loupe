name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: loupe-py · py${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: packages/loupe-py

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui,langgraph]'

      - name: lint
        run: python -m ruff check src/ tests/

      - name: type-check
        run: python -m mypy --ignore-missing-imports src/loupe/

      - name: test
        run: python -m pytest -q

  typescript:
    name: loupe-ts · node${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]

    defaults:
      run:
        working-directory: packages/loupe-ts

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/loupe-ts/package-lock.json

      - name: install
        run: npm ci || npm install

      - name: typecheck
        run: npm run typecheck

      - name: test
        run: npm test

      - name: build
        run: npm run build

  cross-language:
    name: cross-language wire format
    runs-on: ubuntu-latest
    needs: [python, typescript]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v5
        with: { node-version: "22" }

      - name: install both packages
        run: |
          cd packages/loupe-py && pip install -e '.[dev]' && cd ../..
          cd packages/loupe-ts && npm install && cd ../..

      - name: capture from Python
        run: |
          python -c "
          from loupe import trace, record_step
          @trace(framework='ci-py')
          def run():
              record_step(kind='thought', name='ping', inputs={}, outputs={'ok': True})
          run()
          "

      - name: capture from TypeScript
        run: |
          cd packages/loupe-ts && npx tsx -e "
          (async () => {
            const { trace, recordStep } = await import('./src/index');
            // trace(opts, fn) returns a WRAPPED fn — you must call it to run.
            const run = trace({ framework: 'ci-ts' }, async () => {
              recordStep('thought', 'ping', { inputs: {}, outputs: { ok: true } });
            });
            await run();
          })();
          "

      - name: assert both traces in shared ~/.loupe
        run: |
          python -c "
          import json, glob
          files = glob.glob('${HOME}/.loupe/traces/*.jsonl')
          frameworks = set()
          for f in files:
              with open(f) as fh:
                  h = json.loads(next(fh))
              frameworks.add(h.get('framework'))
          print('frameworks:', frameworks)
          assert 'ci-py' in frameworks, 'python trace missing'
          assert 'ci-ts' in frameworks, 'typescript trace missing'
          print('cross-language wire format verified.')
          "
