name: Release

# Publishing is automated. Push a version tag and this workflow builds,
# tests, and publishes BOTH packages:
#   - loupe-ai → PyPI  via OIDC Trusted Publishing (no token)
#   - loupe-ai → npm   via an Automation NPM_TOKEN secret + provenance
#
# Cut a release:
#   1. bump the version in all four sources (the parity test enforces it)
#   2. git tag v0.0.74 && git push origin v0.0.74
#
# One-time setup (see RELEASING.md): PyPI trusts the GitHub OIDC identity
# (no stored token); npm uses an Automation token in the NPM_TOKEN secret
# (the only token type that bypasses 2FA in CI).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # Gate: never publish a build that doesn't pass tests, and never let a
  # mistagged release ship the wrong version.
  # ---------------------------------------------------------------------
  gate:
    name: test + version guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/loupe-ts/package-lock.json

      - name: tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' packages/loupe-py/src/loupe/_version.py | tr -d '"')
          TS=$(node -p "require('./packages/loupe-ts/package.json').version")
          echo "tag=$TAG  python=$PY  ts=$TS"
          test "$TAG" = "$PY" || { echo "::error::tag v$TAG != python $PY"; exit 1; }
          test "$TAG" = "$TS" || { echo "::error::tag v$TAG != ts $TS"; exit 1; }

      - name: python tests
        run: |
          cd packages/loupe-py
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          python -m pytest -q

      - name: typescript tests + build
        run: |
          cd packages/loupe-ts
          npm ci || npm install
          npm test
          npm run build

  # ---------------------------------------------------------------------
  # Publish loupe → PyPI (OIDC Trusted Publishing — no API token)
  # ---------------------------------------------------------------------
  publish-pypi:
    name: publish loupe → PyPI
    needs: gate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # mint the OIDC token PyPI trusts
      contents: read    # required for actions/checkout (declaring permissions
                        # replaces the defaults, so this must be explicit)
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: build sdist + wheel
        run: |
          cd packages/loupe-py
          python -m pip install --upgrade build
          python -m build
      - name: twine check
        run: |
          cd packages/loupe-py
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/loupe-py/dist
          # Idempotent: re-running a release (or re-tagging) never fails on
          # "file already exists" — it just skips versions already uploaded.
          skip-existing: true

  # ---------------------------------------------------------------------
  # Publish loupe-ai → npm (NPM_TOKEN auth + signed provenance)
  # ---------------------------------------------------------------------
  publish-npm:
    name: publish loupe-ai → npm
    needs: gate
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write   # for --provenance (signed build attestation)
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: build
        run: |
          cd packages/loupe-ts
          npm ci || npm install
          npm run build
      - name: publish to npm
        working-directory: packages/loupe-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install -g npm@latest
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          # Idempotent: a re-run (or re-tag) of an already-published version
          # is a clean no-op instead of a hard "cannot publish over" failure.
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already on npm — skipping."
          else
            npm publish --provenance --access public
          fi
