[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "loupe"
version = "0.0.39"
description = "A magnifying glass for your AI agent — open-source forensics + interpretability for LLM agents."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "../../LICENSE" }
authors = [
    { name = "Yashwanth Kamireddi", email = "yashwanthkamireddi@users.noreply.github.com" },
]
keywords = ["llm", "agents", "observability", "interpretability", "mechanistic-interpretability", "evaluation"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "duckdb>=1.0.0",
    "pydantic>=2.0.0",
    "anyio>=4.0.0",
    "rich>=13.0.0",
    "typer>=0.12.0",
]

[project.optional-dependencies]
langgraph = ["langgraph>=0.2.0"]
anthropic = ["anthropic>=0.40.0"]
openai = ["openai>=1.50.0"]
pydantic-ai = ["pydantic-ai>=0.0.20"]
llama-index = ["llama-index>=0.10.0"]
dspy = ["dspy-ai>=2.4.0"]
crewai = ["crewai>=0.30.0"]
autogen = ["pyautogen>=0.2.0"]
universal = ["httpx>=0.27.0"]   # patch ANY httpx-based LLM client
openhands = ["openhands-ai>=0.10.0"]
interp = ["transformer-lens>=2.0.0", "sae-lens>=4.0.0"]
ui = ["fastapi>=0.110.0", "uvicorn>=0.30.0", "httpx>=0.27.0"]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "httpx>=0.27.0",
    "jsonschema>=4.0.0",  # only for the schema-vs-validator parity test
    "hypothesis>=6.0.0",  # property-based fuzzing for redactor + ingest
]

[project.scripts]
loupe = "loupe.cli:app"

[project.urls]
Homepage = "https://loupe.dev"
Repository = "https://github.com/loupe-ai/loupe"
Issues = "https://github.com/loupe-ai/loupe/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/loupe"]

[tool.hatch.build.targets.wheel.force-include]
"src/loupe/_data/loupe-trace.schema.json" = "loupe/_data/loupe-trace.schema.json"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM"]

[tool.ruff.lint.per-file-ignores]
# typer/click idiomatically uses Option() as default; B008 doesn't apply here.
"src/loupe/cli.py" = ["B008"]
# Embedded HTML/CSS/JS — line length is irrelevant inside a string literal.
"src/loupe/report_html.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --strict-markers"
asyncio_mode = "auto"
